# The gauntlet, in GitLab's tongue — the same gates, the same make
# targets, the same verdicts as .github/workflows/. NOTICE claimed the
# workflows are YAML any CI can run; this file is that claim, kept.
# Image pinned to the repo's own Go patch (go.mod is the source of truth).

image: golang:1.25.7

stages:
  - gauntlet
  - promise

variables:
  GOPATH: $CI_PROJECT_DIR/.go
  GOFLAGS: -mod=mod

cache:
  key: go-modules
  paths:
    - .go/pkg/mod/

gauntlet:
  stage: gauntlet
  script:
    - make test
    - make test-report
    - make lint
    - make vocab-check
    - make eval
    - make security-report
  artifacts:
    when: always
    paths:
      - dist/test-report.json
      - dist/security-report.json
      - dist/eval-report.json
    expire_in: 90 days

promise:
  stage: promise
  script:
    - ./hack/check-promise.sh || true
    - test -f dist/install.yaml || echo "install bundle is built by the release walk"
    - ./hack/check-promise.sh
  needs: ["gauntlet"]
  dependencies: ["gauntlet"]

# Deploy on GitLab itself: the site to Pages, the images to GitLab's registry.
pages:
  stage: gauntlet
  image: alpine:3.21
  script:
    - mkdir -p public && cp -r site/* public/
  artifacts:
    paths: [public]
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"

site-image:
  stage: gauntlet
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile Dockerfile.site
      --destination "$CI_REGISTRY_IMAGE/site:$CI_COMMIT_SHORT_SHA"
      --destination "$CI_REGISTRY_IMAGE/site:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"

operator-image:
  stage: gauntlet
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile Dockerfile
      --destination "$CI_REGISTRY_IMAGE/operator:$CI_COMMIT_SHORT_SHA"
      --destination "$CI_REGISTRY_IMAGE/operator:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
